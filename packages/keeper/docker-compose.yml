secrets:
  pk:
    file: ${PK_FILE:-./secrets/pk.txt}
  pchain_tx_private_key:
    file: ${PCHAIN_TX_PRIVATE_KEY_FILE:-./secrets/pchain_tx_private_key.txt}
  pk_completions:
    file: ${PK_COMPLETIONS_FILE:-./secrets/pk_completions.txt}

networks:
  keeper-net:
    name: keeper-net

services:
  keeper-core:
    build:
      context: ../..
      dockerfile: packages/keeper/Dockerfile
    environment:
      - NETWORK=${NETWORK:-fuji}
      - RPC_URL=${RPC_URL:-}
      - SKIP_ABI_VALIDATION=${SKIP_ABI_VALIDATION:-}
      - METRICS_PORT=9090
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - TICK_TIMEOUT=${TICK_TIMEOUT:-}
      - ALERT_TICK_DURATION_MS=${ALERT_TICK_DURATION_MS:-}
    command: ["watch", "${VAULT_ADDRESS}", "--core"]
    restart: unless-stopped
    read_only: true
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9090/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    secrets:
      - pk
    networks:
      - keeper-net

  keeper-completions:
    build:
      context: ../..
      dockerfile: packages/keeper/Dockerfile
    environment:
      - NETWORK=${NETWORK:-fuji}
      - RPC_URL=${RPC_URL:-}
      - UPTIME_BLOCKCHAIN_ID=${UPTIME_BLOCKCHAIN_ID:-}
      - SKIP_ABI_VALIDATION=${SKIP_ABI_VALIDATION:-}
      - METRICS_PORT=9090
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - TICK_TIMEOUT=${TICK_TIMEOUT:-}
      - ALERT_TICK_DURATION_MS=${ALERT_TICK_DURATION_MS:-}
    command: ["watch", "${VAULT_ADDRESS}", "--completions"]
    restart: unless-stopped
    read_only: true
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9090/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    secrets:
      - source: pk_completions
        target: pk
      - pchain_tx_private_key
    networks:
      - keeper-net
