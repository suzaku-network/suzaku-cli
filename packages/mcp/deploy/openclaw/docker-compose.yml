services:
  suzaku-bot:
    build:
      context: ../../../..
      dockerfile: packages/mcp/deploy/openclaw/Dockerfile
      target: bot
    restart: unless-stopped
    read_only: true
    pids_limit: 100
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m
      - /root/.openclaw:size=64m
    volumes:
      - audit-data:/data/audit
      - ./openclaw.json:/root/.openclaw/openclaw.json:ro
      - ./SOUL.md:/root/.openclaw/workspace/SOUL.md:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_USER_ID=${TELEGRAM_ADMIN_USER_ID}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
    networks:
      - suzaku-net

volumes:
  audit-data:

networks:
  suzaku-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.name: br-suzaku
