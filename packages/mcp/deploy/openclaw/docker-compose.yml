services:
  suzaku-bot:
    build:
      context: ../../../..
      dockerfile: packages/mcp/deploy/openclaw/Dockerfile
      target: bot
    restart: unless-stopped
    # 256: the Codex app-server + MCP server + concurrent CLI subprocesses are all node
    # processes (~12 threads each, threads count against pids_limit); 100 starved them
    # mid-turn ("Transport closed").
    pids_limit: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m
    volumes:
      - audit-data:/data/audit
      # Persists OpenClaw state (Codex OAuth profile, telegram spool) across recreates.
      - openclaw-state:/home/node/.openclaw
      - ./openclaw.json:/home/node/.openclaw/openclaw.json.tpl:ro
      - ./SOUL.md:/home/node/.openclaw/workspace/SOUL.md:ro
      - ./EPOCHS.md:/home/node/.openclaw/workspace/EPOCHS.md:ro
      - ./mcporter.json:/home/node/.openclaw/workspace/config/mcporter.json:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_USER_ID=${TELEGRAM_ADMIN_USER_ID}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
      # OpenClaw (≥2026.x) refuses to start its gateway in a container without auth
      # ("Refusing to bind gateway to auto without auth") — any random secret works,
      # e.g. `openssl rand -hex 24`. The gateway port is not published; the token only
      # gates access within the compose network.
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      # Optional: explorer API key — drops on-chain event scans from ~45s to ~5s.
      - SNOWSCAN_API_KEY=${SNOWSCAN_API_KEY}
    networks:
      - suzaku-net

  # DM-only propose bot: same image, --propose-only MCP profile. Holds a Safe
  # DELEGATE key (never an owner key) — it can queue proposals for human review in
  # the Safe UI, never execute. The public group bot above stays keyless.
  # Optional: bring it up explicitly with `docker compose --profile propose up -d`.
  suzaku-propose-bot:
    profiles: ["propose"]
    build:
      context: ../../../..
      dockerfile: packages/mcp/deploy/openclaw/Dockerfile
      target: bot
    restart: unless-stopped
    # 256: the Codex app-server + MCP server + concurrent CLI subprocesses are all node
    # processes (~12 threads each, threads count against pids_limit); 100 starved them
    # mid-turn ("Transport closed").
    pids_limit: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 1.0
    tmpfs:
      - /tmp:size=128m
    volumes:
      - audit-data-propose:/data/audit
      - ./openclaw-propose.json:/home/node/.openclaw/openclaw.json.tpl:ro
      - ./SOUL-propose.md:/home/node/.openclaw/workspace/SOUL.md:ro
      - ./EPOCHS.md:/home/node/.openclaw/workspace/EPOCHS.md:ro
      - ./mcporter-propose.json:/home/node/.openclaw/workspace/config/mcporter.json.tpl:ro
    # The delegate key and Safe API key are delivered as file secrets (mounted at
    # /run/secrets/<name>, read at spawn time) — NOT env vars. They never appear in
    # `docker inspect`, /proc/PID/environ, or the rendered mcporter.json.
    secrets:
      - delegate_pk
      - safe_api_key
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_PROPOSE_BOT_TOKEN}
      # Numeric Telegram user IDs ONLY (tg:123456), never @usernames — usernames can
      # be released and re-registered by someone else.
      - TELEGRAM_ADMIN_USER_ID=${TELEGRAM_ADMIN_USER_ID}
      - SUZAKU_PK_FILE=/run/secrets/delegate_pk
      - SAFE_API_KEY_FILE=/run/secrets/safe_api_key
      - SUZAKU_SAFE_ADDRESS=${SUZAKU_SAFE_ADDRESS}
      - SUZAKU_REWARDS_ADDRESS=${SUZAKU_REWARDS_ADDRESS}
      - SUZAKU_MIDDLEWARE_ADDRESS=${SUZAKU_MIDDLEWARE_ADDRESS}
      - SUZAKU_MAX_REWARDS_AMOUNT=${SUZAKU_MAX_REWARDS_AMOUNT}
      # Same gateway-auth requirement as suzaku-bot above.
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - SNOWSCAN_API_KEY=${SNOWSCAN_API_KEY}
    networks:
      - suzaku-net

# File secrets: host files holding the delegate EOA key and the Safe tx-service API key.
# Create them out-of-band (chmod 600, never committed), e.g.:
#   echo -n 0x<delegate-key> > ./secrets/delegate_pk && chmod 600 ./secrets/delegate_pk
#   echo -n <safe-api-key>   > ./secrets/safe_api_key && chmod 600 ./secrets/safe_api_key
# Override the HOST paths with SUZAKU_DELEGATE_PK_FILE / SUZAKU_SAFE_API_KEY_FILE in your
# .env. (Deliberately NOT named SAFE_API_KEY_FILE — that name is the container-internal
# path the service env sets above; reusing it here would point Docker at /run/secrets/...
# on the host.)
secrets:
  delegate_pk:
    file: ${SUZAKU_DELEGATE_PK_FILE:-./secrets/delegate_pk}
  safe_api_key:
    file: ${SUZAKU_SAFE_API_KEY_FILE:-./secrets/safe_api_key}

volumes:
  audit-data:
  audit-data-propose:
  openclaw-state:

networks:
  suzaku-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.name: br-suzaku
