name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpx esbuild --bundle --platform=node --target=node22 --external:usb --external:@ledgerhq/hw-transport-node-hid --outfile=suzaku-cli.js ./src/cli.ts

      - name: test
        run: ./suzaku-cli.js --help

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: |
            suzaku-cli.js

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: suzaku-cli
          path: ./artifacts

      - run: artifacts/suzaku-cli.js --version

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/suzaku-cli.js
