name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Build and Test
        run: |
          pnpm install --frozen-lockfile
          pnpm suzaku-cli --help

      - uses: ncipollo/release-action@v1
        with:
          makeLatest: true
          generateReleaseNotes: true
